<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TVe Energy Data Mapping</title>
    <script src="https://cdn.sheetjs.com/xlsx-latest/package/dist/xlsx.full.min.js"></script>
    
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; background: #f4f4f9; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .container { background: white; padding: 2rem; border-radius: 12px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 450px; text-align: center; }
        
        .info-box { background: #e0f2fe; color: #0c4a6e; border-left: 4px solid #0284c7; padding: 10px; margin-bottom: 1.5rem; text-align: left; font-size: 0.85rem; border-radius: 4px; }
        .info-box strong { display: block; margin-bottom: 4px; }

        .drop-zone { border: 2px dashed #ccc; border-radius: 8px; padding: 2rem; cursor: pointer; transition: 0.2s; margin-top: 1rem; }
        .drop-zone:hover, .drop-zone.dragover { border-color: #3b82f6; background: #eff6ff; }
        
        .status { margin-top: 1rem; font-size: 0.9rem; color: #555; min-height: 20px; }
        
        .btn { background: #3b82f6; color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-size: 1rem; display: none; margin-top: 1rem; width: 100%; }
        .btn:hover { background: #2563eb; }
        
        h2 { margin-top: 0; margin-bottom: 0.5rem; color: #333; }
        
        .db-status-container { display: flex; justify-content: space-between; font-size: 0.75rem; color: #666; margin-bottom: 1rem; background: #f9fafb; padding: 8px; border-radius: 6px; }
        .db-item span { font-weight: bold; }
        .status-ok { color: green; }
        .status-err { color: red; }
        .status-wait { color: orange; }

        .spinner { display: inline-block; width: 12px; height: 12px; border: 2px solid rgba(0,0,0,0.1); border-left-color: #3b82f6; border-radius: 50%; animation: spin 1s linear infinite; margin-right: 5px; vertical-align: middle; display: none;}
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div class="container">
    <h2>TVe Energy Data Mapping</h2>
    
    <div class="db-status-container">
        <div class="db-item">TVe Defaults DB: <span id="status-tv" class="status-wait">Loading...</span></div>
        <div class="db-item">EPREL DB: <span id="status-eprel" class="status-wait">Loading...</span></div>
    </div>

    <div class="info-box">
        <strong>Requirements:</strong>
        Input file must have columns:
        <ul style="margin: 5px 0 0 15px; padding: 0;">
            <li><code>"Device Make" for TV Brand</code></li>
            <li><code>"Device Model" for Modelnumber</code></li>
        </ul>
    </div>

    <div id="drop-zone" class="drop-zone">
        <p>Drop <strong>Target Excel</strong> file here</p>
        <p style="font-size: 0.8rem; color: #999;">(or click to upload)</p>
        <input type="file" id="file-input" style="display: none;" accept=".xlsx, .csv" />
    </div>

    <div class="status" id="status-text"></div>
    <button id="download-btn" class="btn">Download Updated File</button>
</div>

<script>
// ==========================================
// CONFIGURATION
// ==========================================
const FILE_TV_DATA = "tv_energy_data.csv"; 
const FILE_EPREL = "eprel.csv";

// Global State
let tvDataMap = new Map(); // Key: "Make|Model"
let eprelDataMap = new Map(); // Key: "Model" (modelIdentifier)
let dbsReady = false;
let processedWorkbook = null;
let outputFilename = "updated_data.xlsx"; 

// ==========================================
// 1. DATA LOADING
// ==========================================
async function loadDatabases() {
    const p1 = loadCsvMap(FILE_TV_DATA, 'tv');
    const p2 = loadCsvMap(FILE_EPREL, 'eprel');

    await Promise.all([p1, p2]);
    
    // Check if both loaded
    if (tvDataMap.size > 0 && eprelDataMap.size > 0) {
        dbsReady = true;
    }
}

async function loadCsvMap(url, type) {
    const uiEl = document.getElementById(type === 'tv' ? 'status-tv' : 'status-eprel');
    
    try {
        const response = await fetch(url);
        if (!response.ok) throw new Error("File not found");
        
        const csvText = await response.text();
        const workbook = XLSX.read(csvText, { type: 'string' });
        const sheet = workbook.Sheets[workbook.SheetNames[0]];
        const json = XLSX.utils.sheet_to_json(sheet);

        if (type === 'tv') {
            // Index TV Data by "Make|Model"
            // New schema columns: deviceMake, deviceModel, deviceType, energyConf, 
            //   energySrc, powerOnModeGeneric, powerOnModeSDR, powerOnModeHDR
            json.forEach(row => {
                const make = cleanString(row['deviceMake']);
                const model = cleanString(row['deviceModel']);
                tvDataMap.set(`${make}|${model}`, row);
            });
        } else {
            // Index EPREL Data by "modelIdentifier"
            // New schema has supplierOrTrademark for make matching
            json.forEach(row => {
                const model = cleanString(row['modelIdentifier']);
                if(model) eprelDataMap.set(model, row);
            });
        }

        uiEl.textContent = "Ready";
        uiEl.className = "status-ok";

    } catch (err) {
        console.error(err);
        uiEl.textContent = "Error";
        uiEl.className = "status-err";
    }
}

const cleanString = (val) => val ? String(val).trim() : "";

// Start Loading
loadDatabases();

// ==========================================
// 2. LOGIC
// ==========================================

function getEnergyInfo(targetRow) {
    const makeRaw = targetRow['Device Make'];
    const modelRaw = targetRow['Device Model'];
    
    const make = cleanString(makeRaw);
    const model = cleanString(modelRaw);
    
    // --- STEP 1: Check TV_ENERGY_DATA ---
    const tvKey = `${make}|${model}`;
    const tvRow = tvDataMap.get(tvKey);

    let result = null;

    if (tvRow) {
        const energyConf = cleanString(tvRow['energyConf']);
        const powerSDR = tvRow['powerOnModeSDR'];
        const powerGeneric = tvRow['powerOnModeGeneric'];

        switch (energyConf) {
            case 'eprel-strict':
                result = { Energy_Source: "EPREL", Energy_Conf: "eprel-strict", Energy_Power: powerSDR };
                break;
            case 'eprel-proxy':
                result = { Energy_Source: "EPREL", Energy_Conf: "eprel-proxy", Energy_Power: powerSDR };
                break;
            case 'gemini-strict':
                result = { Energy_Source: "GEMINI", Energy_Conf: "gemini-strict", Energy_Power: powerSDR };
                break;
            case 'gemini-proxy':
                result = { Energy_Source: "GEMINI", Energy_Conf: "gemini-proxy", Energy_Power: powerSDR };
                break;
            case 'fallback-proxy':
                result = { Energy_Source: "FALLBACK", Energy_Conf: "fallback-proxy", Energy_Power: powerGeneric };
                break;
            default:
                // Unknown energyConf — use generic power if available, else hardcoded default
                result = { Energy_Source: "FALLBACK", Energy_Conf: "fallback-proxy", Energy_Power: powerGeneric || 70 };
                break;
        }
    } else {
        // No match in TV DB
        result = { Energy_Source: "DEFAULT", Energy_Conf: "default", Energy_Power: 70 };
    }

    // --- STEP 2: Extended Logic (Check EPREL.csv) ---
    // If the result is a default or fallback, attempt a direct EPREL lookup
    if (result.Energy_Source === "DEFAULT" || result.Energy_Source === "FALLBACK") {
        
        // 1. Match Model
        const eprelRow = eprelDataMap.get(model);
        
        if (eprelRow) {
            // 2. Strict Check: "Device Make" must be inside "supplierOrTrademark"
            const supplier = String(eprelRow['supplierOrTrademark'] || "");
            
            // Check if Make is contained in Supplier/Trademark (Case Insensitive)
            if (supplier.toLowerCase().includes(make.toLowerCase())) {
                
                // 3. Match Found -> Override Result
                return {
                    Energy_Source: "EPREL",
                    Energy_Conf: "eprel-live",
                    Energy_Power: eprelRow['powerOnModeSDR']
                };
            }
        }
    }

    return result;
}

// ==========================================
// 3. UI HANDLERS
// ==========================================
const dropZone = document.getElementById('drop-zone');
const fileInput = document.getElementById('file-input');
const statusText = document.getElementById('status-text');
const downloadBtn = document.getElementById('download-btn');

dropZone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', (e) => processFile(e.target.files[0]));
dropZone.addEventListener('dragover', (e) => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', (e) => {
    e.preventDefault();
    dropZone.classList.remove('dragover');
    if (e.dataTransfer.files.length) processFile(e.dataTransfer.files[0]);
});

function processFile(file) {
    if (!dbsReady) {
        alert("Please wait for the databases to load.");
        return;
    }
    if (!file) return;

    // Filename Logic
    const originalName = file.name;
    const lastDotIndex = originalName.lastIndexOf(".");
    const namePart = lastDotIndex !== -1 ? originalName.substring(0, lastDotIndex) : originalName;
    outputFilename = `${namePart}-tv-e.xlsx`;

    statusText.innerHTML = `<span class="spinner" style="display:inline-block"></span> Processing ${file.name}...`;
    downloadBtn.style.display = "none";

    const reader = new FileReader();
    reader.onload = (e) => {
        try {
            const data = new Uint8Array(e.target.result);
            const workbook = XLSX.read(data, { type: 'array' });
            const sheet = workbook.Sheets[workbook.SheetNames[0]];
            const rawData = XLSX.utils.sheet_to_json(sheet);

            if (rawData.length > 0) {
                const keys = Object.keys(rawData[0]);
                const hasMake = keys.some(k => k.trim() === 'Device Make');
                const hasModel = keys.some(k => k.trim() === 'Device Model');
                if (!hasMake || !hasModel) throw new Error("Missing 'Device Make' or 'Device Model'");
            }

            const finalData = rawData.map(row => {
                const energyInfo = getEnergyInfo(row);
                return { ...row, ...energyInfo };
            });

            const newSheet = XLSX.utils.json_to_sheet(finalData);
            const newWorkbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(newWorkbook, newSheet, "Updated Data");
            processedWorkbook = newWorkbook;
            
            statusText.textContent = "Processing complete!";
            downloadBtn.style.display = "block";
            downloadBtn.textContent = `Download ${outputFilename}`;

        } catch (err) {
            console.error(err);
            statusText.textContent = err.message || "Error processing file.";
            statusText.style.color = "red";
        }
    };
    reader.readAsArrayBuffer(file);
}

downloadBtn.addEventListener('click', () => {
    if (processedWorkbook) XLSX.writeFile(processedWorkbook, outputFilename);
});
</script>

</body>
</html>
